<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Preview | @ko__sukedesu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 32px 16px 48px;
      font-family: sans-serif;
    }
    h1 {
      color: #C9A84C;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .story-wrap {
      width: 100%;
      max-width: 360px;
      position: relative;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .story-wrap img {
      width: 100%;
      display: block;
    }
    .dl-btn {
      display: block;
      margin-top: 20px;
      background: #C9A84C;
      color: #0A0A0A;
      text-align: center;
      padding: 14px 40px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-radius: 4px;
      width: 100%;
      max-width: 360px;
    }
    .note {
      margin-top: 14px;
      font-size: 11px;
      color: #4A4030;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Instagram Story — @ko__sukedesu</h1>
  <div class="story-wrap">
    <img src="story_final.png" alt="Instagram Story">
  </div>
  <a class="dl-btn" href="story_final.png" download="story_ko__sukedesu.png">
    ↓ ダウンロード (1080×1920)
  </a>
  <p class="note">出力サイズ: 1080 × 1920px</p>
</body>
</html>
